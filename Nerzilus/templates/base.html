<!DOCTYPE html>
<html lang="pt-BR" data-theme="{{ tenant.tema if tenant is defined and tenant.tema in ['dark', 'light', 'pink'] else 'dark' }}">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192x192.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260502-pink-soft') }}" />
    <title>{% block title %}NerzilusBee{% endblock %}</title>
  </head>
  <body>
    <main class="app-shell">
      {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
          <div class="flash-stack">
            {% for categoria, mensagem in mensagens %}
              <div class="flash flash-{{ categoria }}">{{ mensagem }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registrado com sucesso:', registration.scope);
            })
            .catch(error => {
              console.log('Falha ao registrar o ServiceWorker:', error);
            });
        });
      }
    </script>
  </body>
</html>
