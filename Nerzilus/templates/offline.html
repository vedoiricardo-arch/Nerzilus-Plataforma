<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem Conexão - Nerzilus</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #d4a373;
      margin-bottom: 10px;
    }
    p {
      color: #a0a0a0;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    button {
      background-color: #d4a373;
      color: #121212;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #b98b5e;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Parece que você perdeu a conexão com a internet.<br>Verifique sua rede e tente novamente para acessar a plataforma Nerzilus.</p>
  <button onclick="window.location.reload();">Tentar Novamente</button>
</body>
</html>
